<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍺 Beer Counter</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  background: #111;
  color: white;
}

.card {
  background: #222;
  max-width: 420px;
  margin: auto;
  margin-top: 40px;
  padding: 20px;
  border-radius: 20px;
}

.count {
  font-size: 90px;
  color: orange;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="name">User</h1>
  <div class="count" id="count">0</div>

  <h3>🏆 Ranking</h3>
  <div id="board"></div>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDXmHOznD2EZf2Pr3-h3hd1iExLlzRqKSA",
  authDomain: "beer-counter-pro.firebaseapp.com",
  projectId: "beer-counter-pro",
  storageBucket: "beer-counter-pro.firebasestorage.app",
  messagingSenderId: "658367655339",
  appId: "1:658367655339:web:6938cf639db54dd62db6ee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 👤 USER FIX (ROBUST)
const params = new URLSearchParams(window.location.search);

let user = params.get("user");

// fallback sauber
if (!user || user.trim() === "") {
  user = "gast";
}

document.getElementById("name").innerText = "🍺 " + user;

const ref = db.collection("beerCounter").doc(user);

// 🍺 COUNT UPDATE
ref.onSnapshot(doc => {
  const data = doc.data();
  document.getElementById("count").innerText = data?.count || 0;
});

// 🍺 AUTO INCREMENT (TEST / NFC SIMULATION)
function addBeer() {
  ref.set({
    count: firebase.firestore.FieldValue.increment(1)
  }, { merge: true });
}

// optional test tap
document.body.addEventListener("click", addBeer);

// 🏆 LEADERBOARD
db.collection("beerCounter")
  .orderBy("count", "desc")
  .onSnapshot(snapshot => {

    const board = document.getElementById("board");
    board.innerHTML = "";

    let rank = 0;

    snapshot.forEach(doc => {
      rank++;

      const d = doc.data();

      let medal = "";
      if(rank===1) medal="👑 ";
      if(rank===2) medal="🥈 ";
      if(rank===3) medal="🥉 ";

      board.innerHTML += `
        <div style="display:flex;justify-content:space-between;padding:5px;">
          <span>${medal}🍺 ${doc.id}</span>
          <span>${d.count || 0}</span>
        </div>
      `;
    });

  });

</script>

</body>
</html>
