<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍺 Beer Counter</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
}

.card {
  background: #222;
  max-width: 420px;
  margin: auto;
  margin-top: 40px;
  padding: 20px;
  border-radius: 20px;
}

.count {
  font-size: 90px;
  color: orange;
}

#board div {
  display: flex;
  justify-content: space-between;
  padding: 6px;
  border-bottom: 1px solid #333;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
}

.reset {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="card">
  <h1 id="name">User</h1>
  <div class="count" id="count">0</div>

  <h3>🏆 Ranking</h3>
  <div id="board"></div>

  <button class="reset" onclick="resetGame()">🔥 ADMIN RESET</button>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDXmHOznD2EZf2Pr3-h3hd1iExLlzRqKSA",
  authDomain: "beer-counter-pro.firebaseapp.com",
  projectId: "beer-counter-pro",
  storageBucket: "beer-counter-pro.firebasestorage.app",
  messagingSenderId: "658367655339",
  appId: "1:658367655339:web:6938cf639db54dd62db6ee"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 👤 USER
const params = new URLSearchParams(window.location.search);
const user = params.get("user") || "gast";
document.getElementById("name").innerText = "🍺 " + user;

const ref = db.collection("beerCounter").doc(user);

// 🧠 ANTI SPAM LOCK
const scanKey = "scan_" + user;
function canScan() {
  const last = localStorage.getItem(scanKey);
  const now = Date.now();

  if (last && now - last < 4000) return false;

  localStorage.setItem(scanKey, now);
  return true;
}

// 🚨 WICHTIG: GLOBAL FLAG (RESET SAFE MODE)
let resetMode = false;

// 🍺 ONLY THIS FUNCTION TRIGGERS BEER
function openLinkScan() {

  if (resetMode) return;
  if (!canScan()) return;

  ref.set({
    count: firebase.firestore.FieldValue.increment(1)
  }, { merge: true });
}

// 👉 PAGE OPEN = SCAN (NFC LOGIC)
openLinkScan();

// 📊 LIVE COUNT
ref.onSnapshot(doc => {
  document.getElementById("count").innerText = doc.data()?.count || 0;
});

// 🏆 LEADERBOARD SAFE
db.collection("beerCounter")
  .orderBy("count", "desc")
  .onSnapshot(snapshot => {

    const board = document.getElementById("board");
    board.innerHTML = "";

    let rank = 0;

    snapshot.forEach(doc => {
      rank++;

      const d = doc.data() || {};

      let medal = "";
      if(rank===1) medal="👑 ";
      if(rank===2) medal="🥈 ";
      if(rank===3) medal="🥉 ";

      board.innerHTML += `
        <div>
          <span>${medal}🍺 ${doc.id}</span>
          <span>${d.count || 0}</span>
        </div>
      `;
    });

  });

// 🔥 ADMIN RESET (FIXED - NO AUTO SCAN BUG)
async function resetGame() {

  const pw = prompt("Admin Passwort?");
  if (pw !== "beer2026") return alert("❌ falsch");

  resetMode = true; // 🚨 BLOCK SCANS

  const all = await db.collection("beerCounter").get();
  const batch = db.batch();

  all.forEach(doc => batch.delete(doc.ref));

  await batch.commit();

  // LOCAL CLEANUP
  localStorage.clear();

  alert("🍺 Reset erfolgreich!");

  setTimeout(() => {
    location.reload();
  }, 300);
}

</script>

</body>
</html>
